name: Backend Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-coverage:
    name: Test And Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore test-service.sln

      - name: NuGet vulnerability scan
        run: |
          set -o pipefail
          dotnet list test-service.sln package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          # Exit non-zero if any package shows a Severity column entry.
          # Output format: "   > Package.Name 1.2.3   1.2.3   High   <CVE-link>"
          if grep -E '^\s*>\s+\S+\s+\S+\s+\S+\s+(Critical|High|Moderate|Low)' vuln.txt; then
            echo "::error::Vulnerable NuGet packages detected — see job log"
            exit 1
          fi

      - name: Build
        run: dotnet build test-service.sln --configuration Release --no-restore

      # Coverage strategy: combined unit + integration gating.
      # Per-project gating is unrealistic for this codebase because controllers/services
      # are predominantly tested via integration tests, not unit tests. The combined
      # threshold reflects total exercised code paths across both suites.
      #
      # Threshold ratchet plan: 77% → 78% → 80%. Raise as DataCleanupService,
      # MessageBusService (after IConnectionFactory injection), and DynamicEntityService
      # gain coverage. See coverage report artifact for current per-file gaps.
      - name: Unit Tests (collect coverage, no threshold)
        run: >
          dotnet test TestService.Unit/TestService.Unit.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:ExcludeByAttribute=GeneratedCodeAttribute
          /p:CoverletOutput=${{ github.workspace }}/TestResults/Coverage/coverage
          /p:CoverletOutputFormat="json%2ccobertura"

      - name: Integration Tests (merge coverage, apply combined threshold)
        run: >
          dotnet test TestService.Tests/TestService.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:ExcludeByAttribute=GeneratedCodeAttribute
          /p:MergeWith=${{ github.workspace }}/TestResults/Coverage/coverage.json
          /p:CoverletOutput=${{ github.workspace }}/TestResults/Coverage/coverage
          /p:CoverletOutputFormat="json%2ccobertura"
          /p:Threshold=77
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-cobertura
          path: TestResults/Coverage/
          if-no-files-found: ignore

  e2e-tests:
    name: E2E Tests (Playwright .NET)
    runs-on: ubuntu-latest
    needs: test-and-coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build E2E project
        run: dotnet build TestService.E2E/TestService.E2E.csproj --configuration Release

      - name: Install Playwright browsers
        run: pwsh TestService.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start dev stack
        run: docker compose -f infrastructure/docker-compose.dev.yml up -d --build --wait

      - name: Run E2E tests
        run: >
          dotnet test TestService.E2E/TestService.E2E.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=e2e.trx"
          --
          TestRunParameters.Parameter\(name=\"WebUrl\",value=\"http://localhost:3000\"\)
          TestRunParameters.Parameter\(name=\"ApiUrl\",value=\"http://localhost:5000\"\)

      - name: Capture stack logs on failure
        if: failure()
        run: docker compose -f infrastructure/docker-compose.dev.yml logs --tail=200

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            TestService.E2E/TestResults/
            TestService.E2E/playwright-report/
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        run: docker compose -f infrastructure/docker-compose.dev.yml down --remove-orphans
