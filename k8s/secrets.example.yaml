# Example secrets file - DO NOT commit actual secrets to git!
# Copy this to secrets.yaml and replace with actual values
# Add secrets.yaml to .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: testservice
type: Opaque
stringData:
  password: "your-mongodb-password-here"
  connection-string: "mongodb://admin:your-mongodb-password-here@mongodb:27017/TestService?authSource=admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: testservice
type: Opaque
stringData:
  password: "your-rabbitmq-password-here"
# Harbor registry pull secret (used by api.yaml and web.yaml)
# Create from command line instead of committing credentials:
#   kubectl create secret docker-registry harbor-secret \
#     --namespace=testservice \
#     --docker-server=YOUR_HARBOR_HOST \
#     --docker-username=YOUR_HARBOR_USER \
#     --docker-password=YOUR_HARBOR_PASSWORD_OR_TOKEN
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-secret
  namespace: testservice
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "harbor.qa2-env01.cloudad.local": {
          "username": "your-harbor-username",
          "password": "your-harbor-password-or-robot-token",
          "auth": "base64-encoded-username:password"
        }
      }
    }
---
# Optional: GitHub Container Registry (if using ghcr.io images)
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: testservice
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "your-github-username",
          "password": "your-github-token",
          "auth": "base64-encoded-username:token"
        }
      }
    }
