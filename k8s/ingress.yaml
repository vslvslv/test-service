apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: testservice-ingress
  namespace: testservice
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - qa2-env01.cloudad.local
    secretName: testservice-tls
  rules:
  - host: qa2-env01.cloudad.local
    http:
      paths:
      # Route all /testservice traffic to the web UI/nginx pod.
      # The web container's nginx.conf handles /testservice/ui, /testservice/api,
      # and /testservice/notificationHub (including rewrites and proxying to the API service).
      - path: /testservice
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 80
