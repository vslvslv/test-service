server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use container default DNS (Docker: 127.0.0.11, K8s: cluster DNS). No custom resolver so the same config works locally and in Kubernetes.
    # API backend host: "api" in Docker Compose, or your API service name in K8s.

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API proxy at root - for when SPA is served at / (e.g. local Docker). Proxies /api/* to backend.
    location /api/ {
        proxy_pass http://api:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # API proxy - rewrite /testservice/api/* to /api/* before proxying
    location /testservice/api/ {
        rewrite ^/testservice/(.*) /$1 break;
        proxy_pass http://api:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SignalR hub proxy
    location /testservice/notificationHub {
        rewrite ^/testservice/(.*) /$1 break;
        proxy_pass http://api:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Handle client-side routing - serve from /testservice/ui/ path
    location /testservice/ui {
        alias /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets within this location
        location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Quiet 204 for Chrome DevTools /.well-known request (avoids 404 log noise)
    location = /.well-known/appspecific/com.chrome.devtools.json {
        access_log off;
        return 204;
    }

    # SPA at root: serve index.html for any path that is not a file (so client-side routes work)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
